<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propio de la pantalla -->
    <link href="css/deposit.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navbar Superior -->
    <header>
        <nav class="navbar navbar-dark bg-dark shadow">
            <div class="container">
                <a class="btn btn-outline-light btn-sm fw-semibold" href="menu.html">⬅ Volver al Menú</a>
                <span class="navbar-brand mb-0 h1 fs-5 fw-bold text-primary-gradient">Alke Wallet</span>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                
                <!-- Tarjeta de Depósito -->
                <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                    <section>
                        <h2 class="h4 text-secondary fw-bold mb-4 text-center">Cargar Fondos a tu Cuenta</h2>
                        <form id="deposit-form">
                            <div class="mb-4">
                                <label for="amount" class="form-label fw-semibold">Monto a depositar ($)</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light fw-bold text-muted">$</span>
                                    <input type="number" class="form-control fs-5 fw-semibold" id="amount" min="1" placeholder="Ej: 50000" required>
                                </div>
                                <div class="form-text text-muted">El saldo se actualizará de forma inmediata en tu cuenta.</div>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm py-3">Realizar Depósito</button>
                        </form>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <!-- Vinculación de Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/deposit.js"></script>
</body>
</html>
