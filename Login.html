<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propio de la pantalla -->
    <link href="css/login.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <!-- Encabezado -->
                <header class="text-center mb-4">
                    <h1 class="display-5 fw-bold text-primary">Alke Wallet</h1>
                </header>

                <!-- Tarjeta de Login -->
                <main class="card shadow border-0 p-4 bg-white rounded-4">
                    <section>
                        <h2 class="h4 text-center text-secondary mb-4">Ingresa a tu cuenta</h2>
                        <form id="login-form">
                            <!-- Input Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control form-control-lg fs-6" id="email" placeholder="nombre@correo.com" required>
                            </div>
                            <!-- Input Password -->
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg fs-6" id="password" placeholder="••••••••" required>
                            </div>
                            <!-- Botón de Envío -->
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Iniciar Sesión</button>
                        </form>
                    </section>
                </main>

                <!-- Footer -->
                <footer class="text-center text-muted mt-4 fs-7">
                    <p>&copy; 2026 Alke Wallet. Todos los derechos reservados.</p>
                </footer>

            </div>
        </div>
    </div>

    <!-- Vinculación de Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
