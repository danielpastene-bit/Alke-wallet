<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Dashboard</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propio de la pantalla -->
    <link href="css/menu.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navbar Responsiva de Bootstrap -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container">
                <a class="navbar-brand fw-bold text-primary-gradient" href="menu.html">Alke Wallet</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto text-center">
                        <li class="nav-item"><a class="nav-link active" href="menu.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
                        <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
                        <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
                        <li class="nav-item"><a class="nav-link text-danger fw-semibold" href="login.html">Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <!-- Tarjeta de Saldo Principal -->
                <section id="balance-section" class="card text-white bg-dark border-0 shadow-lg p-4 rounded-4 text-center mb-4">
                    <h2 class="h5 text-muted text-uppercase tracking-wide">Hola, Usuario</h2>
                    <div class="my-3">
                        <h3 class="fs-6 text-uppercase tracking-wider opacity-75">Saldo Disponible</h3>
                        <p id="total-balance" class="display-4 fw-bold text-success">$150.000</p> 
                    </div>
                </section>

                <!-- Tarjeta de Acciones Rápidas -->
                <section id="quick-actions" class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                    <h3 class="h5 mb-4 text-secondary text-center fw-bold">Acciones Rápidas</h3>
                    <div class="d-grid gap-3">
                        <a href="deposit.html" class="btn btn-outline-success btn-lg fw-semibold p-3 shadow-xs">
                            💰 Depositar Fondos
                        </a>
                        <a href="sendmoney.html" class="btn btn-primary btn-lg fw-semibold p-3 shadow-xs">
                            💸 Transferir Dinero
                        </a>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-muted py-4 border-top mt-auto bg-white">
        <div class="container">
            <p class="mb-0 fs-7">&copy; 2026 Alke Wallet. Solución Digital Financiera.</p>
        </div>
    </footer>

    <!-- Vinculación de Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
