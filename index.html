<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Cargando...</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; /* Fondo azul oscuro institucional */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Pantalla de carga / Enrutador visual -->
    <div class="text-center text-white">
        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <h1 class="h4 fw-bold">Abriendo tu Alke Wallet</h1>
        <p class="text-muted small">Verificando credenciales seguras...</p>
    </div>

    <!-- Scripts de validación y enrutamiento -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Simular un pequeño tiempo de carga para mejorar la UX
            setTimeout(function() {
                // Verificar el estado de la sesión en el almacenamiento local
                const isLoggedIn = localStorage.getItem('isLoggedIn');

                if (isLoggedIn === 'true') {
                    // Si ya está logueado, va directo al Dashboard
                    window.location.href = 'menu.html';
                } else {
                    // Si no, lo enviamos a iniciar sesión
                    window.location.href = 'login.html';
                }
            }, 1000); // 1 segundo de transición fluida
        });
    </script>
</body>
</html>
