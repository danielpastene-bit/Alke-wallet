<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      html, body {
            background: #121214 !important;
            background-color: #121214 !important;
        }

        /* Navbar Superior */
        .navbar {
            background-color: #1c1c1e !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }

        .navbar-brand {
            color: #17d1c1 !important; 
            font-weight: 700 !important;
            letter-spacing: -0.5px;
        }

        .navbar .btn-outline-light {
            color: #8a8a93 !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            border-radius: 50px !important;
            padding: 6px 16px;
        }

        /* Tarjeta de Depósito Oscura */
        main .card {
            background: #1c1c1e !important;
            background-color: #1c1c1e !important; 
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 24px !important; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6) !important;
        }

        /* Título de la tarjeta */
        h2.text-secondary {
            color: #ffffff !important;
            font-size: 1.25rem;
            font-weight: 600 !important;
        }

        /* Etiquetas */
        .form-label {
            color: #8a8a93 !important;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Grupo de Entrada del Monto */
        .input-group-text {
            background-color: #121214 !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #17d1c1 !important; 
            border-top-left-radius: 14px !important;
            border-bottom-left-radius: 14px !important;
        }

        .form-control {
            background-color: #121214 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-top-right-radius: 14px !important;
            border-bottom-right-radius: 14px !important;
            padding: 14px 16px !important;
        }

        /* Ajuste para acoplar perfectamente el input con el símbolo de moneda de Bootstrap */
        .input-group .form-control {
            border-top-left-radius: 0px !important;
            border-bottom-left-radius: 0px !important;
        }

        .form-control:focus {
            border-color: #17d1c1 !important;
            box-shadow: 0 0 0 3px rgba(23, 209, 193, 0.15) !important;
            color: #ffffff !important;
        }

        .form-control::placeholder {
            color: #48484a !important;
        }

        /* Textos explicativos */
        .form-text {
            color: #636366 !important;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Botón estilo cápsula premium turquesa */
        .btn-success {
            background-color: #17d1c1 !important; 
            color: #121214 !important; 
            border: none !important;
            border-radius: 50px !important;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease !important;
        }

        .btn-success:hover {
            background-color: #13b3a5 !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(23, 209, 193, 0.3) !important;
        }
    </style>
</head>
<body>
    
    <header>
        <nav class="navbar navbar-dark bg-dark shadow">
            <div class="container">
                <a class="btn btn-outline-light btn-sm fw-semibold" href="menu.html">⬅ Volver al Menú</a>
                <span class="navbar-brand mb-0 h1 fs-5 fw-bold">Alke Wallet</span>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <section>
                        <h2 class="h4 text-secondary fw-bold mb-4 text-center">Cargar Fondos a tu Cuenta</h2>
                        <form id="deposit-form">
                            <div class="mb-4">
                                <label for="amount" class="form-label fw-semibold">Monto a depositar ($)</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text fw-bold">$</span>
                                    <input type="number" class="form-control fs-5 fw-semibold" id="amount" min="1" placeholder="Ej: 50000" required>
                                </div>
                                <div class="form-text">El saldo se actualizará de forma inmediata en tu cuenta.</div>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm py-3">Realizar Depósito</button>
                        </form>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <!-- Vinculación de Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/deposit.js"></script>
</body>
</html>
