<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #121214 !important; /* Fondo oscuro principal de la imagen */
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Título Principal */
        h1.text-primary {
            color: #17d1c1 !important; /* Cambio de azul Bootstrap a Turquesa de acento */
            font-size: 2.5rem;
            letter-spacing: -0.5px;
        }

        /* Tarjeta de Login */
        main.card {
            background-color: #1c1c1e !important; /* Gris oscuro secundario */
            border: 1px solid rgba(255, 255, 255, 0.05) !important; /* Borde ultra sutil */
            border-radius: 24px !important; /* Esquinas extra redondeadas estilo celular */
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6) !important;
        }

        /* Subtítulo */
        h2.text-secondary {
            color: #8a8a93 !important; /* Gris apagado */
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Etiquetas de los inputs */
        .form-label {
            color: #8a8a93 !important;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Campos de Entrada (Inputs) */
        .form-control {
            background-color: #1c1c1e !important; /* Fondo integrado con la tarjeta */
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 14px !important; /* Esquinas redondeadas suaves */
            padding: 12px 16px !important;
            transition: all 0.2s ease;
        }

        /* Marcador de posición (Placeholder) */
        .form-control::placeholder {
            color: #48484a !important;
        }

        /* Input activo/en foco */
        .form-control:focus {
            border-color: #17d1c1 !important; /* Brillo turquesa */
            box-shadow: 0 0 0 3px rgba(23, 209, 193, 0.15) !important;
            color: #ffffff !important;
        }

        /* Botón Iniciar Sesión */
        .btn-primary {
            background-color: #17d1c1 !important; /* Turquesa brillante */
            color: #121214 !important; /* Texto oscuro para máximo contraste y legibilidad */
            border: none !important;
            border-radius: 50px !important; /* Forma de cápsula idéntica a la imagen */
            padding: 14px !important;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease !important;
        }

        .btn-primary:hover {
            background-color: #13b3a5 !important; /* Turquesa un poco más oscuro al pasar el mouse */
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(23, 209, 193, 0.3) !important;
        }

        /* Footer */
        footer text-muted, footer p {
            color: #48484a !important;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <header class="text-center mb-4">
                    <h1 class="display-5 fw-bold text-primary">Alke Wallet</h1>
                </header>

                <main class="card shadow border-0 p-4 bg-white rounded-4">
                    <section>
                        <h2 class="h4 text-center text-secondary mb-4">Ingresa a tu cuenta</h2>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control form-control-lg fs-6" id="email" placeholder="nombre@correo.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg fs-6" id="password" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Iniciar Sesión</button>
                        </form>
                    </section>
                </main>

                <footer class="text-center text-muted mt-4 fs-7">
                    <p>&copy; 2026 Alke Wallet. Todos los derechos reservados.</p>
                </footer>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
