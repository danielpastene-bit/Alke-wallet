<!DOCTYPE html>
<html lang="es" style="background-color: #121214 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/menu.css" rel="stylesheet">
    
    <style>
        /* Forzar fondo oscuro absoluto en la ventana del navegador */
        html, body {
            background: #121214 !important;
            background-color: #121214 !important; 
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Superior */
        .navbar {
            background-color: #1c1c1e !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }

        .navbar-brand {
            color: #17d1c1 !important; 
            font-weight: 700 !important;
            letter-spacing: -0.5px;
        }

        .nav-link {
            color: #8a8a93 !important;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: #17d1c1 !important;
        }

        /* Tarjeta de Saldo Principal (Sección Superior) */
        #balance-section {
            background: #1c1c1e !important;
            background-color: #1c1c1e !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 24px !important;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4) !important;
            padding: 30px !important;
        }

        #balance-section h2 {
            color: #17d1c1 !important;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #balance-section h3 {
            color: #8a8a93 !important;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* El número del saldo principal */
        #total-balance {
            color: #ffffff !important; /* Blanco puro para elegancia, balanceado con el acento */
            font-weight: 700 !important;
            letter-spacing: -1px;
        }

        /* Tarjeta de Acciones Rápidas Lower */
        #quick-actions {
            background: #1c1c1e !important;
            background-color: #1c1c1e !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 24px !important;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4) !important;
            padding: 30px !important;
        }

        #quick-actions h3 {
            color: #ffffff !important;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Botón Depositar (Estilo Outline Premium) */
        .btn-outline-success {
            color: #17d1c1 !important;
            background-color: transparent !important;
            border: 2px solid rgba(23, 209, 193, 0.3) !important;
            border-radius: 50px !important; /* Forma de cápsula celular */
            font-size: 0.95rem;
            transition: all 0.2s ease !important;
        }

        .btn-outline-success:hover {
            background-color: rgba(23, 209, 193, 0.05) !important;
            border-color: #17d1c1 !important;
            transform: translateY(-1px);
        }

        /* Botón Transferir (Estilo Lleno Premium Turquesa) */
        .btn-primary {
            background-color: #17d1c1 !important;
            color: #121214 !important;
            border: none !important;
            border-radius: 50px !important;
            font-size: 0.95rem;
            transition: all 0.2s ease !important;
        }

        .btn-primary:hover {
            background-color: #13b3a5 !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(23, 209, 193, 0.2) !important;
        }

        /* Footer Oscuro */
        footer {
            background: #1c1c1e !important;
            background-color: #1c1c1e !important;
            border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: #48484a !important;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto text-center">
                        <li class="nav-item"><a class="nav-link active" href="menu.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
                        <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
                        <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
                        <li class="nav-item"><a class="nav-link text-danger fw-semibold" href="Login.html">Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <section id="balance-section" class="card text-white border-0 shadow-lg text-center mb-4">
                    <h2 class="h5">Hola, Usuario</h2>
                    <div class="my-3">
                        <h3 class="text-uppercase tracking-wider opacity-75">Saldo Disponible</h3>
                        <p id="total-balance" class="display-4 fw-bold">$150.000</p> 
                    </div>
                </section>

                <section id="quick-actions" class="card border-0 shadow-sm">
                    <h3 class="h5 mb-4 text-center">Acciones Rápidas</h3>
                    <div class="d-grid gap-3">
                        <a href="deposit.html" class="btn btn-outline-success btn-lg fw-semibold p-3">
                            💰 Depositar Fondos
                        </a>
                        <a href="sendmoney.html" class="btn btn-primary btn-lg fw-semibold p-3">
                            💸 Transferir Dinero
                        </a>
                    </div>
                </section>

                </div>
        </div>
    </main>

    <footer class="text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Alke Wallet. Solución Digital Financiera.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
