<!DOCTYPE html>
<html lang="es" style="background-color: #121214 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Enviar Dinero</title>
    
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ELIMINADO POR COMPLETO EL ARCHIVO VIEJO QUE TRAÍA EL FONDO BLANCO -->
    
    <style>
        /* Forzar fondo oscuro absoluto en la ventana del navegador */
        html, body {
            background: #121214 !important;
            background-color: #121214 !important; 
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Navbar Superior */
        .navbar {
            background-color: #1c1c1e !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }

        .navbar-brand {
            color: #17d1c1 !important; 
            font-weight: 700 !important;
            letter-spacing: -0.5px;
        }

        .navbar .btn-outline-light {
            color: #8a8a93 !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            border-radius: 50px !important;
            padding: 6px 16px;
        }

        /* Tarjetas de Contenido (Removidos fondos blancos heredados) */
        main .card {
            background: #1c1c1e !important;
            background-color: #1c1c1e !important; 
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 24px !important; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6) !important;
        }

        /* Títulos de las Secciones */
        h2.text-secondary, h3.text-secondary {
            color: #ffffff !important;
            font-size: 1.25rem;
            font-weight: 600 !important;
        }

        /* Etiquetas de los Formularios */
        .form-label {
            color: #8a8a93 !important;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Campos de Entrada (Inputs) */
        .form-control {
            background-color: #121214 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 14px !important;
            padding: 12px 16px !important;
        }

        /* Ajuste de inputs de tamaño reducido (sm) en tarjeta 2 */
        .form-control-sm {
            padding: 10px 14px !important;
            border-radius: 12px !important;
        }

        .form-control:focus {
            border-color: #17d1c1 !important;
            box-shadow: 0 0 0 3px rgba(23, 209, 193, 0.15) !important;
            color: #ffffff !important;
        }

        .form-control::placeholder {
            color: #48484a !important;
        }

        /* Icono de Moneda ($) en el Input Group */
        .input-group-text {
            background-color: #121214 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #17d1c1 !important;
            border-top-left-radius: 14px !important;
            border-bottom-left-radius: 14px !important;
        }

        /* Solución al input pegado al prefijo $ */
        .input-group .form-control {
            border-top-left-radius: 0px !important;
            border-bottom-left-radius: 0px !important;
            border-top-right-radius: 14px !important;
            border-bottom-right-radius: 14px !important;
        }

        /* Botón 1: Enviar Fondos (Turquesa Sólido) */
        .btn-primary {
            background-color: #17d1c1 !important; 
            color: #121214 !important; 
            border: none !important;
            border-radius: 50px !important;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease !important;
        }

        .btn-primary:hover {
            background-color: #13b3a5 !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(23, 209, 193, 0.3) !important;
        }

        /* Botón 2: Guardar en Agenda (Outline Premium Turquesa) */
        .btn-outline-secondary {
            color: #17d1c1 !important;
            background-color: transparent !important;
            border: 2px solid rgba(23, 209, 193, 0.3) !important;
            border-radius: 50px !important;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px !important;
            transition: all 0.2s ease !important;
        }

        .btn-outline-secondary:hover {
            background-color: rgba(23, 209, 193, 0.05) !important;
            border-color: #17d1c1 !important;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    
    <header>
        <nav class="navbar navbar-dark bg-dark shadow">
            <div class="container">
                <a class="btn btn-outline-light btn-sm fw-semibold" href="menu.html">⬅ Volver al Menú</a>
                <span class="navbar-brand mb-0 h1 fs-5 fw-bold">Alke Wallet</span>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center gap-4">
            <div class="col-12 col-md-6 col-lg-5">
                
                <section class="card border-0 shadow-sm p-4 rounded-4 mb-4">
                    <h2 class="h4 text-secondary fw-bold mb-4">Enviar Dinero</h2>
                    <form id="send-form">
                        <div class="mb-3">
                            <label for="search-contact" class="form-label fw-semibold">Buscar Contacto</label>
                            <input type="text" class="form-control" id="search-contact" placeholder="Escribe el nombre del destinatario..." required>
                        </div>
                        <div class="mb-4">
                            <label for="send-amount" class="form-label fw-semibold">Monto a enviar ($)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control fw-semibold" id="send-amount" min="1" placeholder="Monto" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold py-2 shadow-xs">Enviar Fondos</button>
                    </form>
                </section>

                <section class="card border-0 shadow-sm p-4 rounded-4">
                    <h3 class="h5 text-secondary fw-bold mb-3">Agregar Nuevo Contacto</h3>
                    <form id="add-contact-form">
                        <div class="mb-2">
                            <input type="text" class="form-control form-control-sm" placeholder="Nombre completo" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control form-control-sm" placeholder="Correo electrónico" required>
                        </div>
                        <button type="submit" class="btn btn-outline-secondary btn-sm w-100 fw-semibold">Guardar en Agenda</button>
                    </form>
                </section>

            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sendmoney.js"></script>
</body>
</html>
