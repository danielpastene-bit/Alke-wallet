<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Historial</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propio de la pantalla -->
    <link href="css/transactions.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navbar Superior -->
    <header>
        <nav class="navbar navbar-dark bg-dark shadow">
            <div class="container">
                <a class="btn btn-outline-light btn-sm fw-semibold" href="menu.html">⬅ Volver al Menú</a>
                <span class="navbar-brand mb-0 h1 fs-5 fw-bold">Alke Wallet</span>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <!-- Contenedor del Historial -->
                <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                    <section>
                        <h2 class="h4 text-secondary fw-bold mb-4">Últimos Movimientos</h2>
                        
                        <!-- List Group con estilos integrados -->
                        <ul id="transactions-list" class="list-group list-group-flush border-top">
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span>🟢 Depósito recibido</span>
                                <span class="fw-bold text-success">+$50.000</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span>🔴 Transferencia enviada a Juan Pérez</span>
                                <span class="fw-bold text-danger">-$20.000</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span>🟢 Depósito inicial</span>
                                <span class="fw-bold text-success">+$120.000</span>
                            </li>
                        </ul>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <!-- Vinculación de Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
