<!DOCTYPE html>
<html lang="es" style="background-color: #121214 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/transactions.css" rel="stylesheet">
    
    <style>
        /* Forzar fondo oscuro absoluto en la ventana del navegador */
        html, body {
            background: #121214 !important;
            background-color: #121214 !important; 
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Navbar Superior */
        .navbar {
            background-color: #1c1c1e !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }

        .navbar-brand {
            color: #17d1c1 !important; 
            font-weight: 700 !important;
            letter-spacing: -0.5px;
        }

        .navbar .btn-outline-light {
            color: #8a8a93 !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            border-radius: 50px !important;
            padding: 6px 16px;
        }

        /* Tarjeta del Historial Principal */
        main .card {
            background: #1c1c1e !important;
            background-color: #1c1c1e !important; 
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 24px !important; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6) !important;
        }

        /* Título Principal */
        h2.text-secondary {
            color: #ffffff !important;
            font-size: 1.25rem;
            font-weight: 600 !important;
        }

        /* Limpieza del List Group de Bootstrap para hacerlo Dark */
        .list-group {
            border-top: none !important;
        }

        .list-group-item {
            background-color: transparent !important; /* Elimina fondos blancos internos */
            border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important; /* Líneas divisorias ultra finas */
            color: #ffffff !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        .list-group-item:last-child {
            border-bottom: none !important;
        }

        /* Badges de Estado estilo Premium (Opacos y minimalistas) */
        .badge-status-in {
            background-color: rgba(23, 209, 193, 0.1) !important;
            color: #17d1c1 !important;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 10px;
        }

        .badge-status-out {
            background-color: rgba(239, 68, 68, 0.1) !important;
            color: #ef4444 !important;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 10px;
        }

        /* Estilización de los Montos Financieros */
        .text-success {
            color: #17d1c1 !important; /* Sincronizado con el turquesa de ingresos */
            font-size: 1.05rem;
        }

        .text-danger {
            color: #ef4444 !important; /* Rojo sutil para egresos */
            font-size: 1.05rem;
        }

        /* Texto de descripción de transferencia */
        .tx-title {
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    
    <header>
        <nav class="navbar navbar-dark bg-dark shadow">
            <div class="container">
                <a class="btn btn-outline-light btn-sm fw-semibold" href="menu.html">⬅ Volver al Menú</a>
                <span class="navbar-brand mb-0 h1 fs-5 fw-bold">Alke Wallet</span>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <section>
                        <h2 class="h4 text-secondary fw-bold mb-4">Últimos Movimientos</h2>
                        
                        <ul id="transactions-list" class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <div>
                                    <span class="badge-status-in">Ingreso</span>
                                    <span class="tx-title">Depósito recibido</span>
                                </div>
                                <span class="fw-bold text-success">+$50.000</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <div>
                                    <span class="badge-status-out">Egreso</span>
                                    <span class="tx-title">Transferencia enviada a Juan Pérez</span>
                                </div>
                                <span class="fw-bold text-danger">-$20.000</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <div>
                                    <span class="badge-status-in">Ingreso</span>
                                    <span class="tx-title">Depósito inicial</span>
                                </div>
                                <span class="fw-bold text-success">+$120.000</span>
                            </li>
                        </ul>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
